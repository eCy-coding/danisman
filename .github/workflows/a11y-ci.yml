# a11y-ci.yml — P18 FE Track 1, Aşama 2.
# Critical-route WCAG 2.1 AA gate via @axe-core/playwright.
#
# Mevcut `quality-gate.yml` lint + content-QA + smoke + bundle-size kapsar;
# E2E suite ise `ci.yml` üzerinden tetiklenir (uzun süreli). Bu workflow:
#   - Sadece `e2e/a11y-ci.spec.ts` (6 critical public rota) çalıştırır,
#   - PR'da hızlı (~3-5 dk) bir deterministic gate sağlar,
#   - Critical violation tek başına fail eder; serious/moderate informational
#     (spec dosyasında policy var).
#
# Daha derin denetim (`a11y.spec.ts` AAA + `crawl_a11y_wcag.spec.ts`) ana
# E2E suite içinde nightly olarak koşar; bu hızlı PR gate'idir.
#
# `production-audit` job: günlük 04:00 UTC cron — `e2e/axe-production.spec.ts`
# (5 yüksek-trafik rota × 2 locale = 10 test) build edilmiş bundle üzerinde
# koşar. Launch sonrası a11y regresyonunu PR beklemeden yakalar; fail =
# Actions varsayılan e-posta bildirimi.
name: A11y CI (critical routes)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily production parity audit — 04:00 UTC (07:00 TRT)
    - cron: '0 4 * * *'

permissions:
  contents: read

concurrency:
  group: a11y-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  a11y:
    name: Axe-core WCAG 2.1 AA — critical-route gate
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # PR/push gate'i; günlük cron `production-audit` job'ına devreder.
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Provide minimal production env (placeholder values)
        run: |
          cp .env.production.example .env.production
          sed -i 's/__FILL_ME__/ci-stub/g' .env.production

      - name: Build production bundle
        # SKIP_PRERENDER — axe audits the hydrated SPA via vite preview; the
        # 170-route static prerender added ~7 min and pushed the job past its
        # 12-min budget (every run died as "canceled" before axe started).
        run: npm run build
        env:
          NODE_ENV: production
          SKIP_PRERENDER: '1'

      - name: Run a11y CI spec (critical routes only)
        run: npx playwright test e2e/a11y-ci.spec.ts --project=chromium --reporter=list
        env:
          NODE_ENV: production
          CI: 'true'

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-ci-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  production-audit:
    name: Axe-core WCAG 2.1 AA — daily production audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Sadece günlük cron + elle tetik; PR/push'ta `a11y` job zaten koşar.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Provide minimal production env (placeholder values)
        run: |
          cp .env.production.example .env.production
          sed -i 's/__FILL_ME__/ci-stub/g' .env.production

      - name: Build production bundle
        run: npm run build
        env:
          NODE_ENV: production

      - name: Run production a11y audit (5 routes × 2 locales)
        run: npx playwright test e2e/axe-production.spec.ts --project=chromium --reporter=list
        env:
          NODE_ENV: production
          CI: 'true'

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-production-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
