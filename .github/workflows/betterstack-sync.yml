name: BetterStack Monitor Sync

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/betterstack-monitors.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync BetterStack monitors
        run: node scripts/betterstack-sync.mjs
        env:
          BETTERSTACK_API_TOKEN: ${{ secrets.BETTERSTACK_API_TOKEN }}
