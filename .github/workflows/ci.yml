name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Type-Check & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Run Unit Tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
      - name: Env preflight check
        run: npm run preflight:env
        continue-on-error: true

  # ── P35-T10: Dependency Security Audit (npm audit) ────────
  security-audit:
    name: Security — npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
      - run: npm ci
      - name: npm audit (fail on high+)
        # --audit-level=high: CI fails only for High and Critical CVEs.
        # Moderate/Low are reported but non-blocking (acceptable risk tolerance).
        run: npm audit --audit-level=high
      - name: Production dependencies only audit (strict)
        # Separate stricter check for production deps (no devDependency noise).
        run: npm audit --audit-level=moderate --omit=dev

  build:
    name: Production Build
    needs: quality
    runs-on: ubuntu-latest
    # Phase 110a: Sentry release + source-map upload runs only when secrets
    # are configured. Vite plugin (vite.config.ts) skips silently if
    # SENTRY_AUTH_TOKEN is empty, so this job is safe in forks/PRs without
    # the secret available.
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG || 'ecypro' }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT || 'ecypro-frontend' }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      VITE_APP_VERSION: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so Sentry can compute commit range
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
      - run: npm ci
      - name: Build (with Sentry source-map upload when token present)
        run: npm run build
      - name: Sentry release (explicit sentry-cli)
        if: env.SENTRY_AUTH_TOKEN != ''
        continue-on-error: true
        run: npm run release:sentry
        env:
          SENTRY_RELEASE: ecypro@${{ github.sha }}
      - name: Sentry release status
        if: always()
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            echo "✅ Sentry release uploaded for ${{ github.sha }}"
          else
            echo "ℹ️  SENTRY_AUTH_TOKEN not set — release upload skipped (config-only run)"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run E2E Tests (smoke subset against local preview)
        # S14 — full e2e/ suite includes crawl_*/axe-production/consulting specs
        # that target LIVE production (real API keys, DB, MCP) and cannot pass
        # against a local vite preview. PR gate runs the curated smoke subset
        # (relative-path specs) via the default config's localhost webServer.
        # Prod-targeting audits run separately via playwright.smoke.config.ts.
        run: npx playwright test e2e/smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ── Phase 20 D1: Accessibility Audit (axe-core via Playwright) ──
  a11y:
    name: A11y Audit
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
      - run: npm ci
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/
      - name: Install Playwright Browsers (chromium only — a11y is browser-agnostic)
        run: npx playwright install --with-deps chromium
      - name: Run a11y spec
        run: npx playwright test e2e/a11y.spec.ts --project=chromium --reporter=list
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 14

  # ── Phase 40-T02: Lighthouse CI — preview build, warn-only ──
  lighthouse:
    name: Lighthouse Budget
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Install LHCI
        run: npm install -g @lhci/cli@0.13.x
      - name: Run Lighthouse CI
        run: lhci autorun --config lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: |
            lighthouse-reports/
            docs/PERFORMANCE_REPORT.md
            .lighthouseci/
          retention-days: 30
