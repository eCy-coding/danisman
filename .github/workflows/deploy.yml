# Auto-deploy on merge to main — addresses GAPS P1-6 (no auto-deploy pipeline).
#
# SCAFFOLD: this wires the deploy step that was previously manual (Vercel +
# Render dashboards). It is SAFE-INERT until the required secrets are set —
# each job is gated on its secret being present, so an unconfigured repo
# simply skips deployment instead of failing.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN        — Vercel personal/team token
#   VERCEL_ORG_ID       — Vercel organisation id
#   VERCEL_PROJECT_ID   — Vercel project id
#   RENDER_DEPLOY_HOOK  — Render service deploy-hook URL (backend API)
#
# Deploy only runs after the CI workflow ("CI") succeeds on main, so we never
# ship a red build.

name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    # Only on a green CI run, and only when Vercel is configured.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Guard — Vercel configured?
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN not set — skipping Vercel deploy (scaffold inert)."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: ${{ steps.guard.outputs.configured == 'true' }}
        run: npm i -g vercel@latest

      # `vercel build` sets VERCEL=1, which scripts/prerender.mjs treats as an
      # opt-out signal (Vercel's own build container can't sustain a headless
      # Chromium through a full route crawl — see prerender.mjs comments).
      # Left alone, `vercel build` on this runner would ship an empty SPA
      # shell as the production HTML. Installing deps + the pinned Playwright
      # Chromium here, and forcing prerender to run locally on THIS runner
      # (not inside Vercel's builder) below, keeps per-route SEO HTML intact.
      # Browser binaries are ~150MB; cache keyed on the playwright-core version
      # so a deploy only re-downloads when the pinned Playwright changes.
      - name: Cache Playwright browsers
        if: ${{ steps.guard.outputs.configured == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install deps + Playwright Chromium (prerender runs on this runner)
        if: ${{ steps.guard.outputs.configured == 'true' }}
        run: |
          npm ci
          npx playwright install --with-deps chromium chromium-headless-shell

      - name: Pull, build & deploy (production)
        if: ${{ steps.guard.outputs.configured == 'true' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          # Force prerender to run via local Playwright instead of skipping
          # (VERCEL=1) or selecting the Vercel-only @sparticuz/chromium binary.
          PRERENDER_FORCE_LOCAL: '1'
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::notice::RENDER_DEPLOY_HOOK not set — skipping Render deploy (scaffold inert)."
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deploy triggered."
