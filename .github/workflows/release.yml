name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  sentry-sourcemaps:
    name: Sentry Source Maps
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT_FRONTEND: ${{ secrets.SENTRY_PROJECT_FRONTEND }}
      # Tagged releases use the tag name as SENTRY_RELEASE override.
      # Push-to-main uses the SHA-based release from Vercel sentryVitePlugin.
      SENTRY_RELEASE: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Upload source maps to Sentry (frontend)
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        continue-on-error: true
        run: npm run release:sentry
