# P35-T06: OWASP ZAP Baseline Security Scan
#
# Runs OWASP ZAP (Zed Attack Proxy) automated baseline scan against the
# production URL to detect:
#   - Missing security headers (CSP, HSTS, X-Frame-Options, etc.)
#   - XSS reflection vulnerabilities
#   - Clickjacking
#   - Mixed content issues
#   - Information disclosure (server headers, error messages)
#
# Baseline scan: passive analysis only (~5 min). Does NOT perform active attacks.
# Full scan (`action-full-scan`) → use in weekly cron for deeper analysis.
#
# Trigger:
#   - schedule: every Monday 03:00 UTC (low traffic window)
#   - workflow_dispatch: manual trigger from GitHub UI
#   - push to main (optional: keep commented to avoid blocking deploys)
#
# Thresholds (fail vs warn):
#   - HIGH severity findings → fail CI (block deploy)
#   - MEDIUM severity → warn only (non-blocking)
#   - LOW + INFO → ignored (too noisy)
#
# Report: uploaded as artifact + summary in PR comment (via actions/github-script)
#
# Setup:
#   1. TARGET_URL secret → GitHub repo Settings → Secrets → Actions
#      (e.g. https://ecypro.com or staging URL)
#   2. Optional: ZAP_RULES_FILE for custom rule config

name: Security — OWASP ZAP Scan

on:
  schedule:
    # Every Monday at 03:00 UTC (low traffic)
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan (default: production)'
        required: false
        default: 'https://www.ecypro.com'

env:
  TARGET_URL: ${{ github.event.inputs.target_url || secrets.ZAP_TARGET_URL || 'https://www.ecypro.com' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  zap-baseline-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create ZAP rules file (suppress false positives)
        run: |
          # ZAP rules to suppress: format is <ruleId>:<action>:<evidence>
          # 10010 = Secure flag not set for session cookie (false positive — API-only server)
          # 10027 = Information disclosure via "Server" header (nginx version pinned via env)
          # 10096 = Timestamp disclosure — suppress (non-security)
          cat > zap-rules.conf << 'EOF'
          10010 IGNORE
          10096 IGNORE
          EOF

      - name: Run OWASP ZAP Baseline Scan
        # action-baseline performs passive analysis only (no active attacks).
        # fail_action: high → CI fails only when HIGH severity alerts are found.
        # cmd_options: -j (JSON report), -m 5 (max 5 spider crawl pages), -T 60 (60s timeout)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: 'zap-rules.conf'
          fail_action: high
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          cmd_options: '-j -m 5 -T 60'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report-${{ github.run_number }}
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 90

      - name: Post summary to job summary
        if: always()
        run: |
          echo "## 🔐 OWASP ZAP Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ env.TARGET_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f report_md.md ]; then
            cat report_md.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No report generated." >> $GITHUB_STEP_SUMMARY
          fi
