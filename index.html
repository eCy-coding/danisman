    <link rel="modulepreload" href="/assets/lc.js" />

    <meta name="theme-color" content="#050810" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <link rel="stylesheet" href="/index.css" />

  <body class="bg-neutral text-slate-900 font-sans">

        <div style="text-align:center;max-width:900px;width:100%;">

          <h1 style="color:#fff;font-size:clamp(3rem,5.5vw,5.5rem);line-height:1.05;margin:0 0 1.5rem;font-weight:700;font-family:Georgia,serif;letter-spacing:-0.02em;">
            Scale Your<br>
            <span style="background:linear-gradient(135deg,#2563eb,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Enterprise</span><br>

          </h1>
          <p style="color:#94a3b8;font-size:1.0625rem;line-height:1.75;max-width:580px;margin:0 auto 2.5rem;font-family:system-ui,sans-serif;">Accelerate growth and reduce operational costs by 40% with data-driven insights and strategic consulting.</p>
          <div style="display:flex;gap:0.875rem;justify-content:center;flex-wrap:wrap;">
            <a href="/contact" data-testid="hero-cta-primary" style="background:#2563eb;color:#fff;padding:0.875rem 1.75rem;border-radius:0.75rem;text-decoration:none;font-weight:600;font-size:0.9375rem;font-family:system-ui,sans-serif;">Book Discovery Call &#8594;</a>
            <a href="/services" data-testid="hero-cta-secondary" style="border:1px solid rgba(255,255,255,0.18);color:#fff;padding:0.875rem 1.75rem;border-radius:0.75rem;text-decoration:none;font-weight:600;font-size:0.9375rem;font-family:system-ui,sans-serif;">Explore Services</a>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
