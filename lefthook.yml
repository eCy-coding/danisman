# Lefthook Configuration (The Great Filter)
# Refer to usage guide: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    lint-staged:
      glob: '*.{ts,tsx,js,jsx}'
      run: npx lint-staged
    secret-scan:
      # Phase 20 D3: real gitleaks scan over the working tree only
      # (avoids re-scanning git history on every commit).
      run: npx gitleaks detect --no-banner --no-git --redact --source=.

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    type-check:
      # Full typecheck: frontend (tsc) + server (tsconfig.server.json)
      run: npm run typecheck
    build-check:
      run: npm run build
