# P40-T09: Blue-Green Deployment — nginx Upstream Config
#
# Architecture:
#   Two API instances run simultaneously (blue:3001, green:3002)
#   nginx upstream "ecypro_api" points to the ACTIVE instance
#   Deployment switches active slot by:
#     1. Start new instance on inactive port
#     2. Health-check new instance (GET /api/health)
#     3. Flip upstream (nginx -s reload — zero-downtime config reload)
#     4. Drain + stop old instance
#
# Zero-downtime math:
#   nginx reload = graceful: existing connections complete on old config
#   New connections: immediately use new upstream
#   In-flight request loss = 0 (nginx queues during reload, ~5ms)
#
# Health check config:
#   passive:   nginx detects failures via proxy_next_upstream
#   active:    nginx Plus only (OSS uses passive + external check script)
#   Script:    scripts/blue-green-switch.sh performs pre-flight health check
#
# Usage:
#   nginx -t -c /path/to/nginx-bluegreen.conf   # validate
#   nginx -s reload                             # apply (graceful, zero-downtime)
#
# Production setup:
#   1. Copy this file → /etc/nginx/sites-available/ecypro
#   2. ln -sf /etc/nginx/sites-available/ecypro /etc/nginx/sites-enabled/
#   3. Run `scripts/blue-green-switch.sh blue|green` to flip
#
# TLS: Certbot/Let's Encrypt handles HTTPS (not in this file)
#      Use `certbot --nginx -d ecypro.com` after initial setup.

# ─── Upstream: active API slot ──────────────────────────────
# Change this line to flip blue/green (then nginx -s reload)
# Blue  = 3001
# Green = 3002
upstream ecypro_api {
    server 127.0.0.1:3001;  # ACTIVE SLOT — updated by blue-green-switch.sh

    # Connection pool: keepalive reduces TCP handshake overhead
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# ─── Rate limit zones ────────────────────────────────────────
# Zone stored in shared memory (survives worker crash/reload)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ─── HTTP → HTTPS redirect ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ecypro.com www.ecypro.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main HTTPS server ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ecypro.com www.ecypro.com;

    # TLS (managed by certbot; paths auto-set)
    ssl_certificate     /etc/letsencrypt/live/ecypro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ecypro.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ─── Security headers ─────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP: nonce injected by Express middleware (P35-T05) — nginx only sets fallback
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── Root (SPA static files) ──────────────────────────
    root /var/www/ecypro/dist;
    index index.html;
    charset utf-8;

    # ─── Gzip compression ─────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/ttf font/woff2;

    # ─── Rate limiting: connection cap ────────────────────
    limit_conn conn_limit 20;

    # ─── API proxy → active upstream slot ─────────────────
    location /api/ {
        # Rate limit: 30 req/min burst=10
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://ecypro_api;
        proxy_http_version 1.1;

        # Keep-alive to upstream
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;

        # Auto-retry on upstream error (failsafe during blue-green switch)
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 5s;

        # Buffer settings
        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         8 8k;
        proxy_busy_buffers_size 16k;
    }

    # ─── Auth endpoints: stricter rate limit ──────────────
    location ~ ^/api/auth/(login|register|refresh) {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass         http://ecypro_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── Health check (no rate limit, no log) ─────────────
    location = /api/health {
        access_log off;
        proxy_pass http://ecypro_api/api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ─── Static assets: long cache ────────────────────────
    location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── SPA fallback ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # SPA HTML: never cache
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ─── Error pages ──────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/ecypro/dist;
        internal;
    }
}
