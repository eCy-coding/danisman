# ─── Render Blueprint (IaC) ───────────────────────────────
# Deploy with: render blueprint apply
# https://docs.render.com/infrastructure-as-code

databases:
  - name: ecypro-db
    plan: starter  # Free tier
    databaseName: ecypro
    user: ecypro_user
    region: frankfurt
    postgresMajorVersion: "17"
    ipAllowList: []  # Allow all (Render internal network)

services:
  - type: web
    name: ecypro-api
    plan: starter  # Free tier
    runtime: node
    region: frankfurt
    buildCommand: npm install && npx prisma generate && npx tsc -p tsconfig.server.json
    startCommand: node dist/server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ecypro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://ecypro.com
      - key: PORT
        value: "3001"
      - key: REDIS_URL
        value: "" # Set to your Redis instance URL (e.g., Redis Cloud, Upstash)
      - key: SENTRY_DSN
        value: "" # Set to your Sentry DSN for error tracking
    autoDeploy: true
    branch: main
    numInstances: 1
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 75
      targetCPUPercent: 75
