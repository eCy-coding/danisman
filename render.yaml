# ─── Render Blueprint (Infrastructure as Code) ────────────────────────────
# Deploy: render blueprint apply
# Docs:   https://docs.render.com/infrastructure-as-code
#
# P40 — ZERO-COST DEPLOY (Free tier):
#   * Frontend: Vercel (free) — www.ecypro.com
#   * Backend:  Render Free   — api.ecypro.com (this manifest)
#   * Database: Neon Postgres (free 0.5 GB, external) — DATABASE_URL set in dashboard
#   * DNS:      Hostinger (existing) — A/CNAME records

# NOTE (P40): databases: section removed — Neon provides Postgres externally.
# Set DATABASE_URL in Render dashboard from Neon connection string.

services:
  - type: web
    name: ecypro-api
    plan: free
    runtime: node
    region: frankfurt
    rootDir: .
    # BE-9: prisma migrate deploy is now part of the build step so each
    # deploy applies pending migrations before the new server starts.
    buildCommand: |
      npm ci --include=dev && \
      npx prisma generate && \
      # P41: bootstrap a fresh DB — push schema first, mark all existing
      # migrations as applied, then run migrate deploy for any future ones.
      # Idempotent on subsequent deploys (db push is a no-op when in-sync,
      # migrate resolve fails-soft if already applied).
      npx prisma db push --accept-data-loss && \
      for m in $(ls prisma/migrations | grep -v migration_lock); do \
        npx prisma migrate resolve --applied "$m" 2>/dev/null || true; \
      done && \
      npx prisma migrate deploy && \
      npx tsc -p tsconfig.server.json
    startCommand: node dist/server/index.js
    healthCheckPath: /api/health
    # P20 BE Aşama 4 — Post-deploy cache warm-up.
    # NOTE (P39): postDeployCommand requires plan: standard or higher.
    # On Starter we run the warm-up manually post-deploy via curl.
    # postDeployCommand: |
    #   sleep 5 && \
    #   curl -sf -X POST -H "Authorization: Bearer $CACHE_WARMUP_TOKEN" \
    #     "${CACHE_WARMUP_BASE_URL:-https://api.ecypro.com}/api/admin/cache/warmup" \
    #     || true
    autoDeploy: true
    branch: main
    numInstances: 1
    # NOTE (P39): autoscaling (scaling block) requires plan: standard+
    # Restore on plan upgrade.
    # scaling:
    #   minInstances: 1
    #   maxInstances: 3
    #   targetMemoryPercent: 75
    #   targetCPUPercent: 75
    envVars:
      # ── Required ───────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false # P40: Neon connection string — set in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        # P40: include Vercel preview URL for staging deploys
        value: https://www.ecypro.com,https://ecypro.com,https://danisman.vercel.app
      - key: TRUST_PROXY
        value: "1"

      # ── Observability ──────────────────────────────────────
      - key: SENTRY_DSN
        sync: false # Set in Render dashboard (per-environment value)
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: LOG_LEVEL
        value: info
      - key: LOGTAIL_SOURCE_TOKEN
        sync: false # Optional — set in dashboard if Better Stack used

      # ── Integrations (set in Render dashboard, never commit values) ──
      - key: REDIS_URL
        sync: false
      - key: CALCOM_API_KEY
        sync: false
      - key: CALCOM_EVENT_TYPE_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@ecypro.com
      - key: GEMINI_API_KEY
        sync: false
      - key: WEBHOOK_HMAC_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: HIBP_API_KEY
        sync: false

      # ── Rate-limit overrides (optional) ────────────────────
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000" # 15 min
      - key: RATE_LIMIT_MAX
        value: "100"

      # ── P20: Connection pool sizing (Starter-tier defaults) ──
      # Formula: pool = (cpu_cores × 2) + 1   →   Starter 0.5 vCPU = ~5
      # We round up to 10 for Node async IO-bound headroom.
      # See outputs/P20_BE_POOL_MATH.md for the full derivation.
      - key: PG_POOL_MAX
        value: "10"
      - key: PG_POOL_MIN
        value: "0"
      - key: PG_POOL_IDLE_MS
        value: "30000"
      - key: PG_POOL_CONN_MS
        value: "30000"
      - key: PG_POOL_QUERY_MS
        value: "10000"
      - key: PG_STATEMENT_MS
        value: "15000"

      # ── P20: Node heap ceiling (V8 default 1.5 GB doesn't fit Starter) ──
      # Starter (512 MB total, ~380 MB app baseline) → cap V8 at 384 MB.
      # Upgrade to "1536" on Standard, "3072" on Pro.
      - key: NODE_OPTIONS
        value: "--max-old-space-size=384"

      # ── P20: Read replica (Standard+ only; leave unset on Starter) ──
      - key: DATABASE_URL_REPLICA
        sync: false

      # ── P20: Cache warm-up (post-deploy hook) ──
      - key: CACHE_WARMUP_TOKEN
        generateValue: true
